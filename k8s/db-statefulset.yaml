apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: attendance-db
  namespace: attendance
spec:
  serviceName: attendance-db
  replicas: 1
  selector:
    matchLabels:
      app: attendance-db
  template:
    metadata:
      labels:
        app: attendance-db
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            # User and DB name come from the ConfigMap (same keys the app uses).
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: attendance-config
                  key: DB_USER
            # Password comes from the single secret key shared with the app.
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: attendance-db-secret
                  key: DB_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: attendance-config
                  key: DB_NAME
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
              subPath: pgdata
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - postgres
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - postgres
            initialDelaySeconds: 15
            periodSeconds: 20
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        storageClassName: attendance-sc
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 5Gi
